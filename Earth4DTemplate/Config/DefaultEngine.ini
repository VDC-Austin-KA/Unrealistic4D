; Earth4D template — engine config.
; Cesium for Unreal streams Google Photorealistic 3D Tiles. Provide a key/token:
;   • Google Map Tiles API key (set on the Cesium3DTileset's Google source), or
;   • a Cesium ion access token.
; Do NOT commit real keys. Set them per-machine in DefaultEngine.ini (local) or via
; an environment variable read at startup.

[/Script/EngineSettings.GameMapsSettings]
